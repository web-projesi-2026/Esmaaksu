<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafArası — Kayıt Ol</title>
  <meta name="description" content="RafArası'na ücretsiz üye olun. Kitap dünyasına adım atın.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-book-half me-2"></i>RafArası</a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="index.html"><i class="bi bi-house me-1"></i>Ana Sayfa</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="auth-wrapper">
    <!-- Left: Illustration -->
    <div class="auth-illustration">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      <i class="bi bi-people brand-icon"></i>
      <h2>Aramıza Katılın</h2>
      <p>RafArası ailesine katılın, binlerce kitap arasından seçim yapın, satıcı olarak gelir elde edin.</p>
    </div>

    <!-- Right: Register Form -->
    <div class="auth-form-side">
      <div class="auth-container">
        <h2>Kayıt Ol</h2>
        <p class="auth-subtitle">Ücretsiz hesap oluşturun</p>

        <div class="role-select btn-group w-100" role="group">
          <button type="button" data-role="buyer" class="btn btn-outline-primary active">
            <i class="bi bi-bag me-1"></i>Alıcı
          </button>
          <button type="button" data-role="seller" class="btn btn-outline-primary">
            <i class="bi bi-shop me-1"></i>Satıcı
          </button>
        </div>

        <form id="register-form">
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="name" name="name" class="form-control" placeholder="Ad Soyad" required>
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" class="form-control" placeholder="E-posta adresiniz" required>
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control" placeholder="Şifre (min. 6 karakter)" required>
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="password-confirm" class="form-control" placeholder="Şifre tekrar" required>
          </div>

          <div class="form-check mb-3 d-flex align-items-center gap-2">
            <input class="form-check-input m-0" type="checkbox" id="terms" required>
            <label class="form-check-label" for="terms" style="font-size:0.85rem; color: var(--text-muted); padding-top: 2px;">
              <a href="#" style="color: var(--primary-light);">Kullanım şartlarını</a> ve <a href="#" style="color: var(--primary-light);">gizlilik politikasını</a> kabul ediyorum.
            </label>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus me-1"></i>Kayıt Ol
          </button>

          <div class="social-divider">veya</div>

          <div class="social-buttons">
            <button type="button" class="btn-social"><i class="bi bi-google"></i> Google</button>
            <button type="button" class="btn-social"><i class="bi bi-facebook"></i> Facebook</button>
          </div>

          <p class="auth-link">Zaten bir hesabınız var mı? <a href="login.html">Giriş yapın</a></p>
        </form>
      </div>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/scroll-top.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
