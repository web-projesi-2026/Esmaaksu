<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafArası — Giriş Yap</title>
  <meta name="description" content="RafArası hesabınıza giriş yapın. Kitap alışverişine hemen başlayın.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-book-half me-2"></i>RafArası</a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="index.html"><i class="bi bi-house me-1"></i>Ana Sayfa</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="auth-wrapper">
    <!-- Left: Illustration -->
    <div class="auth-illustration">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      <i class="bi bi-book-half brand-icon"></i>
      <h2>Tekrar Hoşgeldiniz</h2>
      <p>Binlerce kitap arasından favorinizi seçin, güvenle alışveriş yapın ve okuma keyfinizi yaşayın.</p>
    </div>

    <!-- Right: Login Form -->
    <div class="auth-form-side">
      <div class="auth-container">
        <h2>Giriş Yap</h2>
        <p class="auth-subtitle">Hesabınıza giriş yaparak devam edin</p>

        <div class="role-select btn-group w-100" role="group">
          <button type="button" data-role="buyer" class="btn btn-outline-primary active">
            <i class="bi bi-bag me-1"></i>Alıcı
          </button>
          <button type="button" data-role="seller" class="btn btn-outline-primary">
            <i class="bi bi-shop me-1"></i>Satıcı
          </button>
        </div>

        <form id="login-form">
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" class="form-control" placeholder="E-posta adresiniz" required>
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" name="password" class="form-control" placeholder="Şifreniz" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check d-flex align-items-center gap-2">
              <input class="form-check-input m-0" type="checkbox" id="remember-me">
              <label class="form-check-label" for="remember-me" style="font-size:0.85rem; color: var(--text-muted); padding-top: 1px;">Beni hatırla</label>
            </div>
            <a href="#" style="font-size:0.85rem; color: var(--primary-light); text-decoration: none;">Şifremi Unuttum</a>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Giriş Yap
          </button>

          <div class="admin-hint">
            <i class="bi bi-shield-lock me-1"></i>Yönetici girişi: e-posta ve şifreye <strong>admin</strong> yazın.
          </div>

          <div class="social-divider">veya</div>

          <div class="social-buttons">
            <button type="button" class="btn-social"><i class="bi bi-google"></i> Google</button>
            <button type="button" class="btn-social"><i class="bi bi-facebook"></i> Facebook</button>
          </div>

          <p class="auth-link">Hesabınız yok mu? <a href="register.html">Kayıt olun</a></p>
        </form>
      </div>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
