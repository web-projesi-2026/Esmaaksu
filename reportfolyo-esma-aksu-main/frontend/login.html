<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafArası — Giriş Yap</title>
  <meta name="description" content="RafArası hesabınıza giriş yapın. Kitap alışverişine hemen başlayın.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>
<body class="auth-page">
  <header class="site-header">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-book-half me-2"></i>RafArası</a>
        <div class="d-flex align-items-center gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="index.html"><i class="bi bi-house me-1"></i>Ana Sayfa</a>
        </div>
      </div>
    </nav>
  </header>

  <main class="auth-wrapper">
    <!-- Left: Illustration -->
    <div class="auth-illustration">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
      <i class="bi bi-book-half brand-icon"></i>
      <h2>Tekrar Hoşgeldiniz</h2>
      <p>Binlerce kitap arasından favorinizi seçin, güvenle alışveriş yapın ve okuma keyfinizi yaşayın.</p>
    </div>

    <!-- Right: Login Form -->
    <div class="auth-form-side">
      <div class="auth-container">
        <h2>Giriş Yap</h2>
        <p class="auth-subtitle">Hesabınıza giriş yaparak devam edin</p>

        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label text-start d-block mb-2">E-posta Adresi</label>
            <input type="email" id="email" name="email" class="form-control rounded-pill px-3 py-2" placeholder="ornek@mail.com" required>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label text-start d-block mb-2">Şifre</label>
            <input type="password" id="password" name="password" class="form-control rounded-pill px-3 py-2" placeholder="••••••••" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember-me" style="background: var(--bg-glass); border-color: var(--border-glass);">
              <label class="form-check-label" for="remember-me" style="font-size:0.85rem; color: var(--text-muted);">Beni Hatırla</label>
            </div>
            <a href="#" style="font-size:0.85rem; color: var(--text-secondary); text-decoration: none;">Şifremi Unuttum</a>
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2" style="font-size: 1.1rem; font-weight: 700; text-transform: uppercase;">
            GİRİŞ YAP
          </button>
          
          <p class="auth-link mt-4 text-center" style="font-size: 0.9rem;">
            <span style="color: var(--text-muted);">Hesabın yok mu?</span> <a href="register.html" style="color: var(--accent-coral); font-weight: 600; text-decoration: none;">Hemen Kayıt Ol</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
