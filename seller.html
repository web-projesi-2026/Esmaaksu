<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafArası — Satıcı Paneli</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/pages/seller.css">
</head>
<body class="seller-body">

  <div class="seller-layout">
    <!-- Sidebar -->
    <aside class="seller-sidebar">
      <a href="index.html" class="seller-brand" style="text-decoration:none;">
        <i class="bi bi-book-half"></i> RafArası
      </a>
      <ul class="seller-nav">
        <li><a href="#" class="active"><i class="bi bi-grid-fill"></i> Panelim</a></li>
        <li><a href="#" id="open-add-modal"><i class="bi bi-plus-lg"></i> Kitap Ekle</a></li>
        <li><a href="index.html"><i class="bi bi-arrow-left"></i> Siteye Dön</a></li>
      </ul>

      <div style="margin-top: auto; padding-top: 40px;">
        <div class="d-flex align-items-center gap-3 p-3" style="background: rgba(255,255,255,0.05); border-radius: 12px;">
          <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--seller-accent); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem;">E</div>
          <div>
            <div style="font-size: 0.85rem; font-weight: 600;" id="sidebar-name">Satıcı</div>
            <div style="font-size: 0.75rem; color: var(--seller-accent);">Satıcı Hesabı</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="seller-content">
      <!-- Header -->
      <header class="seller-header">
        <div class="seller-welcome">
          <h2 id="welcome-text">Merhaba 👋</h2>
          <p style="color: #888;">RafArası Satıcı Paneline Hoş Geldiniz.</p>
        </div>
        <button class="btn-add-top" id="btn-add-new">
          <i class="bi bi-plus-lg"></i> Yeni Kitap Ekle
        </button>
      </header>

      <!-- Stats -->
      <div class="seller-stats">
        <div class="stat-box">
          <div class="icon"><i class="bi bi-list-ul"></i></div>
          <div class="info">
            <h4 id="stat-total">0</h4>
            <p>Toplam Kitap</p>
          </div>
        </div>
        <div class="stat-box">
          <div class="icon" style="color: #27ae60; background: rgba(39, 174, 96, 0.1);"><i class="bi bi-check-circle"></i></div>
          <div class="info">
            <h4 id="stat-active">0</h4>
            <p>Aktif İlan</p>
          </div>
        </div>
      </div>

      <!-- Kitap Tablosu -->
      <div class="seller-table-container">
        <div class="table-header">
          <h3 style="font-size: 1.1rem; margin: 0;"><i class="bi bi-collection me-2"></i>Kitaplarım</h3>
          <button class="btn btn-sm btn-outline-primary" style="font-size: 0.8rem;">
            <i class="bi bi-plus-lg me-1"></i>Yeni Kitap
          </button>
        </div>
        <div class="table-responsive">
          <table class="seller-table">
            <thead>
              <tr>
                <th>FOTO</th>
                <th>BAŞLIK</th>
                <th>FİYAT</th>
                <th>KATEGORİ</th>
                <th>DURUM</th>
                <th>İŞLEM</th>
              </tr>
            </thead>
            <tbody id="seller-books-table">
              <!-- JS tarafından doldurulacak -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Kitap Ekle / Düzenle Modal -->
  <div class="seller-modal" id="book-modal">
    <div class="modal-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="modal-title" style="margin:0;">📚 Yeni Kitap Ekle</h3>
        <button class="btn-close btn-close-white" id="close-modal"></button>
      </div>
      <form id="seller-book-form">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" style="color:#aaa;">Kitap Adı *</label>
            <input type="text" name="title" class="form-control bg-dark border-secondary text-white" placeholder="Örn: Suç ve Ceza" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" style="color:#aaa;">Yazar *</label>
            <input type="text" name="author" class="form-control bg-dark border-secondary text-white" placeholder="Örn: Dostoyevski" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" style="color:#aaa;">Fiyat (TL) *</label>
            <input type="number" name="price" step="0.01" class="form-control bg-dark border-secondary text-white" placeholder="45.90" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" style="color:#aaa;">Kategori</label>
            <select name="category" class="form-select bg-dark border-secondary text-white">
              <option value="Edebiyat">Edebiyat</option>
              <option value="Çocuk">Çocuk</option>
              <option value="Sınav Hazırlık">Sınav Hazırlık</option>
              <option value="Kırtasiye">Kırtasiye</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label" style="color:#aaa;">Kapak Resmi (URL)</label>
            <input type="url" name="imageUrl" class="form-control bg-dark border-secondary text-white" placeholder="https://...">
          </div>
          <div class="col-12 mt-4">
            <button type="submit" id="modal-submit-btn" class="btn btn-primary w-100 fw-bold py-2" style="font-size:1rem;">
              KAYDET
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/pages/seller.js"></script>
</body>
</html>
