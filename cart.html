<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafArası — Sepetim</title>
  <meta name="description" content="Sepetinizdeki kitapları inceleyin ve siparişinizi tamamlayın.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: var(--space-xl);
      align-items: start;
    }
    @media (max-width: 991px) {
      .cart-layout { grid-template-columns: 1fr; }
    }
    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: var(--space-lg);
      align-items: center;
      padding: var(--space-lg);
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
      transition: all var(--transition-smooth);
    }
    .cart-item:hover {
      border-color: var(--border-glow);
      box-shadow: var(--shadow-glow);
    }
    .cart-item-image {
      width: 80px;
      height: 100px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: rgba(255,255,255,0.3);
    }
    .cart-item-info .item-title {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .cart-item-info .item-author {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .cart-item-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--space-sm);
    }
    .cart-item-actions .item-price {
      font-weight: 700;
      color: var(--accent-gold);
      font-size: 1.1rem;
    }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-full);
      padding: 0.2rem 0.5rem;
    }
    .quantity-control button {
      width: 28px;
      height: 28px;
      border: none;
      background: var(--bg-glass-strong);
      border-radius: 50%;
      color: var(--text-primary);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }
    .quantity-control button:hover {
      background: var(--primary);
      color: #fff;
    }
    .quantity-control .qty-value {
      min-width: 20px;
      text-align: center;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .remove-item {
      font-size: 0.8rem;
      color: var(--accent-coral);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .remove-item:hover { text-decoration: underline; }

    /* Order summary */
    .order-summary {
      background: var(--bg-glass);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      position: sticky;
      top: 100px;
    }
    .order-summary h3 {
      font-family: var(--font-heading);
      margin-bottom: var(--space-lg);
      font-size: 1.25rem;
      color: var(--text-primary);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: var(--space-sm) 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .summary-row.total {
      border-top: 1px solid var(--border-glass);
      margin-top: var(--space-md);
      padding-top: var(--space-md);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
    }
    .summary-row.total .total-price {
      color: var(--accent-gold);
    }
    .order-summary .btn {
      border-radius: var(--radius-full) !important;
      padding: 0.875rem !important;
      font-size: 0.95rem !important;
      margin-top: var(--space-lg);
    }
    .order-summary .secure-note {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: var(--space-md);
    }
    .empty-cart {
      text-align: center;
      padding: var(--space-3xl);
      color: var(--text-muted);
    }
    .empty-cart i {
      font-size: 4rem;
      color: var(--text-muted);
      margin-bottom: var(--space-lg);
      display: block;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-book-half me-2"></i>RafArası</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <form class="d-flex ms-auto me-3 search-form">
            <div class="input-group">
              <input class="form-control" type="search" placeholder="Kitap ara..." aria-label="Search">
              <button class="btn btn-outline-secondary search-btn" type="submit"><i class="bi bi-search"></i></button>
            </div>
          </form>
          <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
            <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-person"></i></a></li>
            <li class="nav-item position-relative">
              <a class="nav-link" href="cart.html"><i class="bi bi-bag-fill" style="color: var(--primary-light);"></i></a>
              <span class="cart-count position-absolute top-0 start-100 translate-middle badge rounded-pill">3</span>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container main">
    <h2 class="section-title"><i class="bi bi-bag me-2"></i>Sepetim</h2>

    <div class="cart-layout">
      <div class="cart-items-list" id="cart-items">
        <!-- Sepet elemanları JS ile buraya yüklenecek -->
      </div>

      <!-- Order Summary -->
      <div class="order-summary" id="order-summary-container" style="display: none;">
        <h3><i class="bi bi-receipt me-2"></i>Sipariş Özeti</h3>
        <div class="summary-row">
          <span>Ara Toplam (<span id="total-qty-label">0</span> ürün)</span>
          <span id="subtotal-price">₺0.00</span>
        </div>
        <div class="summary-row">
          <span>Kargo</span>
          <span style="color: var(--accent-mint);" id="shipping-label">Ücretsiz</span>
        </div>
        <div class="summary-row total">
          <span>Toplam</span>
          <span class="total-price" id="cart-total">₺0.00</span>
        </div>
        <button class="btn btn-primary w-100" id="checkout-btn">
          <i class="bi bi-credit-card me-1"></i>Ödemeye Geç
        </button>
        <p class="secure-note"><i class="bi bi-shield-lock me-1"></i>Güvenli ödeme ile korunuyorsunuz</p>
      </div>

      <div id="empty-cart-msg" class="empty-cart" style="display: none; grid-column: 1 / -1;">
        <i class="bi bi-cart-x"></i>
        <h3>Sepetiniz boş</h3>
        <p>Görünüşe göre henüz sepetinize bir kitap eklemediniz.</p>
        <a href="index.html" class="btn btn-primary mt-3">Alışverişe Başla</a>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-light pt-5">
    <div class="container">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-center pb-3">
        <p class="mb-0">&copy; 2026 RafArası. Tüm hakları saklıdır.</p>
      </div>
    </div>
  </footer>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="assets/js/theme-toggle.js"></script>
  <script src="assets/js/scroll-top.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cartItemsContainer = document.getElementById('cart-items');
      const emptyMsg = document.getElementById('empty-cart-msg');
      const summaryContainer = document.getElementById('order-summary-container');
      const subtotalEl = document.getElementById('subtotal-price');
      const totalEl = document.getElementById('cart-total');
      const qtyLabel = document.getElementById('total-qty-label');
      const cartCountBadge = document.querySelector('.cart-count');

      function showToast(msg, type = 'info') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast-msg ${type}`;
        const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-info-circle-fill';
        t.innerHTML = `<i class="bi ${icon}"></i> ${msg}`;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
      }

      function getCart() {
        return JSON.parse(localStorage.getItem('cart')) || [];
      }

      function saveCart(cart) {
        localStorage.setItem('cart', JSON.stringify(cart));
        if (window.syncCartWithDB) window.syncCartWithDB();
        updateCartUI();
      }

      function updateCartUI() {
        const cart = getCart();
        
        if (cart.length === 0) {
          cartItemsContainer.innerHTML = '';
          emptyMsg.style.display = 'block';
          summaryContainer.style.display = 'none';
          if (cartCountBadge) cartCountBadge.textContent = '0';
          return;
        }

        emptyMsg.style.display = 'none';
        summaryContainer.style.display = 'block';

        let subtotal = 0;
        let totalItems = 0;

        cartItemsContainer.innerHTML = cart.map((item, index) => {
          const price = parseFloat(item.price) || 0;
          subtotal += price * item.quantity;
          totalItems += item.quantity;

          const imageHTML = item.image 
            ? `<img src="${item.image}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;" onerror="this.style.display='none'">`
            : `<i class="bi bi-book"></i>`;

          return `
            <div class="cart-item">
              <div class="cart-item-image" style="background: linear-gradient(135deg, var(--primary), var(--primary-light));">
                ${imageHTML}
              </div>
              <div class="cart-item-info">
                <div class="item-title">${item.title}</div>
                <div class="item-author">${item.author}</div>
              </div>
              <div class="cart-item-actions">
                <div class="item-price">₺${(price * item.quantity).toFixed(2)}</div>
                <div class="quantity-control">
                  <button onclick="changeQty(${index}, -1)"><i class="bi bi-dash"></i></button>
                  <span class="qty-value">${item.quantity}</span>
                  <button onclick="changeQty(${index}, 1)"><i class="bi bi-plus"></i></button>
                </div>
                <span class="remove-item" onclick="removeItem(${index})"><i class="bi bi-trash3 me-1"></i>Kaldır</span>
              </div>
            </div>
          `;
        }).join('');

        subtotalEl.textContent = `₺${subtotal.toFixed(2)}`;
        totalEl.textContent = `₺${subtotal.toFixed(2)}`; // İndirim şimdilik yok
        qtyLabel.textContent = totalItems;
        if (cartCountBadge) cartCountBadge.textContent = totalItems;
      }

      window.changeQty = (index, delta) => {
        const cart = getCart();
        if (cart[index]) {
          cart[index].quantity += delta;
          if (cart[index].quantity < 1) cart[index].quantity = 1;
          saveCart(cart);
        }
      };

      window.removeItem = (index) => {
        const cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        showToast('Ürün sepetten kaldırıldı.', 'info');
      };

      document.getElementById('checkout-btn')?.addEventListener('click', () => {
        window.location.href = 'checkout.html';
      });

      updateCartUI();
    });
  </script>
</body>
</html>
